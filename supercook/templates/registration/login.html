{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Login - SuperCook</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container" style="grid-template-columns:1fr;max-width:400px;margin:40px auto;">
        <div class="ingredients">
            <h2>Login</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
